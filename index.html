<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Coaching Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
  :root{
    --ink:#0e2b28; --ink-soft:#3d5652; --muted:#6b827e;
    --brand:#0f766e; --brand-600:#0d8f83; --brand-050:#e7f2f0;
    --bg:#f3f7f6; --surface:#ffffff; --line:#e0ebe8; --line-strong:#c9dcd8;
    --ok:#0f9d6f; --ok-bg:#e6f6ef; --ok-line:#bfe8d7;
    --danger:#d02525; --danger-bg:#fbe9e9; --danger-line:#f3c8c8;
    --radius:14px; --shadow:0 1px 2px rgba(14,43,40,.04),0 10px 30px rgba(14,43,40,.06);
    --font-d:'Plus Jakarta Sans',system-ui,sans-serif;
    --font-b:'Inter',system-ui,sans-serif;
    --sidebar-w:256px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{font-family:var(--font-b);background:var(--bg);color:var(--ink);font-size:14px;-webkit-font-smoothing:antialiased;}
  h1,h2,h3,.font-display{font-family:var(--font-d);letter-spacing:-.01em;color:var(--ink);}
  a{color:var(--brand);}
  input,select,textarea,button{font-family:var(--font-b);}

  /* ---------- SIDEBAR ---------- */
  .sidebar{position:fixed;top:0;left:0;bottom:0;width:var(--sidebar-w);background:linear-gradient(180deg,var(--ink) 0%, #123833 100%);color:#fff;display:flex;flex-direction:column;z-index:20;}
  .sb-brand{padding:22px 20px 18px;display:flex;align-items:center;gap:10px;border-bottom:1px solid rgba(255,255,255,.08);}
  .sb-mark{width:34px;height:34px;border-radius:9px;background:linear-gradient(150deg,var(--brand),#0b5c55);display:flex;align-items:center;justify-content:center;font-family:var(--font-d);font-weight:800;font-size:14px;color:#fff;box-shadow:0 4px 12px rgba(15,118,110,.35);}
  .sb-title{font-family:var(--font-d);font-weight:700;font-size:14.5px;line-height:1.2;}
  .sb-sub{font-size:11px;color:rgba(255,255,255,.45);margin-top:2px;}
  .sb-nav{padding:16px 12px;flex:1;}
  .sb-section-label{font-size:10.5px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:rgba(255,255,255,.35);padding:6px 10px 8px;}
  .sb-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:9px;font-size:13.5px;font-weight:500;color:rgba(255,255,255,.72);cursor:pointer;margin-bottom:2px;transition:background .12s ease,color .12s ease;}
  .sb-item svg{flex-shrink:0;opacity:.85;}
  .sb-item:hover{background:rgba(255,255,255,.07);color:#fff;}
  .sb-item.active{background:var(--brand);color:#fff;}
  .sb-item.active svg{opacity:1;}
  .sb-foot{padding:14px 16px 18px;border-top:1px solid rgba(255,255,255,.08);}
  .sb-role-label{font-size:10.5px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:rgba(255,255,255,.35);margin-bottom:8px;}
  .role-toggle{display:flex;background:rgba(255,255,255,.08);border-radius:9px;padding:3px;gap:3px;margin-bottom:12px;}
  .role-toggle button{flex:1;border:none;background:transparent;color:rgba(255,255,255,.55);font-size:12.5px;font-weight:600;padding:7px 0;border-radius:6px;cursor:pointer;}
  .role-toggle button.active{background:#fff;color:var(--ink);}
  .sync-status{display:flex;align-items:center;gap:7px;font-size:11.5px;font-weight:600;padding:8px 10px;border-radius:8px;background:rgba(255,255,255,.06);color:rgba(255,255,255,.75);cursor:pointer;}
  .sync-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
  .sync-status:hover{background:rgba(255,255,255,.1);}

  /* ---------- MAIN ---------- */
  .main{margin-left:var(--sidebar-w);min-height:100vh;}
  .topbar{background:rgba(255,255,255,.9);backdrop-filter:blur(8px);border-bottom:1px solid var(--line);padding:18px 32px;display:flex;align-items:flex-start;justify-content:space-between;gap:16px;position:sticky;top:0;z-index:10;flex-wrap:wrap;}
  .page-title{font-family:var(--font-d);font-weight:700;font-size:19px;color:var(--ink);}
  .page-desc{font-size:13px;color:var(--muted);margin-top:3px;max-width:580px;}
  .content{padding:26px 32px 56px;}
  .banner{display:flex;align-items:center;gap:10px;padding:11px 16px;border-radius:10px;font-size:12.5px;font-weight:600;margin-bottom:18px;border:1px solid transparent;}
  .banner-warn{background:#fdf3e2;color:#8a5a06;border-color:#f2ddac;}
  .banner-ok{background:var(--ok-bg);color:#0a7a56;border-color:var(--ok-line);}

  /* ---------- COMPONENTS ---------- */
  .card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);}
  .stat-card{padding:16px 18px;}
  .stat-label{font-size:11px;font-weight:600;letter-spacing:.03em;text-transform:uppercase;color:var(--muted);margin-bottom:6px;}
  .stat-value{font-family:var(--font-d);font-weight:700;font-size:24px;color:var(--ink);}

  .template-card{display:flex;align-items:center;gap:14px;padding:16px 18px;margin-bottom:18px;background:var(--brand-050);border:1px solid #cfe6e2;}
  .template-icon{width:42px;height:42px;border-radius:10px;background:#fff;display:flex;align-items:center;justify-content:center;color:var(--brand);flex-shrink:0;box-shadow:var(--shadow);}
  .template-title{font-family:var(--font-d);font-weight:700;font-size:14px;color:var(--ink);}
  .template-sub{font-size:12px;color:var(--ink-soft);margin-top:1px;}

  table{border-collapse:collapse;width:100%;}
  thead th{font-size:11px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;color:var(--muted);text-align:left;padding:11px 16px;white-space:nowrap;background:#FAFCFB;border-bottom:1px solid var(--line);}
  tbody td{padding:13px 16px;font-size:13.5px;color:var(--ink);border-bottom:1px solid var(--line);vertical-align:middle;}
  tbody tr:last-child td{border-bottom:none;}
  tbody tr:hover{background:#FAFCFB;}
  .cell-sub{font-size:12px;color:var(--muted);margin-top:1px;}
  .cell-muted{color:var(--muted);}

  .badge{display:inline-flex;align-items:center;gap:6px;padding:4px 11px;border-radius:6px;font-size:12px;font-weight:600;border:1px solid transparent;}
  .badge-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}
  .badge-ok{background:var(--ok-bg);color:var(--ok);border-color:var(--ok-line);}
  .badge-ok .badge-dot{background:var(--ok);}
  .badge-danger{background:var(--danger-bg);color:var(--danger);border-color:var(--danger-line);}
  .badge-danger .badge-dot{background:var(--danger);}

  .btn{font-family:var(--font-b);font-weight:600;font-size:13px;padding:9px 16px;border-radius:10px;cursor:pointer;border:1px solid transparent;transition:all .13s ease;display:inline-flex;align-items:center;gap:6px;white-space:nowrap;}
  .btn-primary{background:var(--brand);color:#fff;box-shadow:0 6px 14px rgba(15,118,110,.22);}
  .btn-primary:hover{background:var(--brand-600);transform:translateY(-1px);}
  .btn-outline{background:#fff;color:var(--ink);border-color:var(--line-strong);}
  .btn-outline:hover{background:#F7FAF9;border-color:var(--brand);color:var(--brand);}
  .btn-sm{padding:6px 12px;font-size:12.5px;}
  .btn-disabled{background:#EEF2F1;color:var(--muted);cursor:not-allowed;border-color:var(--line);}
  .btn-link-sm{font-size:12px;font-weight:600;color:var(--brand);cursor:pointer;display:inline-flex;align-items:center;gap:4px;}
  .btn-link-sm:hover{text-decoration:underline;}

  .icon-btn{width:30px;height:30px;border-radius:8px;display:inline-flex;align-items:center;justify-content:center;cursor:pointer;border:1px solid var(--line);background:#fff;color:var(--ink-soft);transition:all .12s ease;}
  .icon-btn:hover{background:#F5FAF9;border-color:var(--brand);color:var(--brand);}

  input[type=text],input[type=date],select,textarea{width:100%;padding:10px 13px;border:1px solid var(--line-strong);border-radius:10px;font-size:13.5px;font-family:var(--font-b);background:#fcfefe;color:var(--ink);transition:.13s;}
  input:focus,textarea:focus{outline:none;border-color:var(--brand);box-shadow:0 0 0 3px rgba(15,118,110,.13);background:#fff;}
  input:disabled,textarea:disabled{background:#F4F6F5;color:var(--ink-soft);}
  ::placeholder{color:#a7b6b2;}
  label.field-label{font-size:11.5px;font-weight:700;color:var(--ink-soft);text-transform:uppercase;letter-spacing:.03em;display:block;margin-bottom:6px;}
  .field-hint{font-size:11.5px;color:var(--muted);font-weight:400;text-transform:none;letter-spacing:0;margin-top:5px;}

  .section-title{font-family:var(--font-d);font-weight:700;font-size:14.5px;color:var(--ink);display:flex;align-items:center;gap:10px;}
  .section-num{width:26px;height:26px;border-radius:8px;background:var(--brand-050);color:var(--brand);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;flex-shrink:0;}

  .modal-backdrop{position:fixed;inset:0;background:rgba(14,43,40,.5);display:flex;align-items:center;justify-content:center;z-index:50;padding:20px;overflow-y:auto;}
  .progress-track{height:7px;border-radius:99px;background:#E9EFEE;overflow:hidden;}
  .progress-fill{height:100%;background:var(--brand);border-radius:99px;transition:width .4s ease;}
  .file-drop{border:1.5px dashed var(--line-strong);border-radius:11px;padding:15px;background:#fbfdfd;text-align:left;}
  .file-chip{display:inline-flex;align-items:center;gap:8px;padding:9px 13px;border:1px solid var(--line);border-radius:9px;background:#fbfdfd;font-size:13px;}
  .empty-state{text-align:center;padding:56px 20px;color:var(--muted);}
  .divider{border-top:1px solid var(--line);}

  .pagination{display:flex;align-items:center;justify-content:space-between;gap:14px;padding:14px 16px;flex-wrap:wrap;border-top:1px solid var(--line);}
  .pagination-info{font-size:12.5px;color:var(--muted);}
  .pagination-pages{display:flex;align-items:center;gap:4px;}
  .page-btn{min-width:30px;height:30px;padding:0 6px;border-radius:8px;border:1px solid var(--line);background:#fff;color:var(--ink-soft);font-size:12.5px;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;}
  .page-btn:hover:not(:disabled){border-color:var(--brand);color:var(--brand);}
  .page-btn.active{background:var(--brand);border-color:var(--brand);color:#fff;}
  .page-btn:disabled{opacity:.4;cursor:not-allowed;}
  .page-ellipsis{color:var(--muted);font-size:12.5px;padding:0 2px;}

  .login-gate{max-width:400px;margin:60px auto;text-align:center;padding:36px 30px;}
  .login-gate .login-icon{width:52px;height:52px;border-radius:14px;background:var(--brand-050);color:var(--brand);display:flex;align-items:center;justify-content:center;margin:0 auto 18px;}
  .login-gate h2{font-size:17px;margin-bottom:6px;}
  .login-gate p{font-size:13px;color:var(--muted);margin-bottom:22px;line-height:1.6;}
  .login-gate-btn-wrap{display:flex;justify-content:center;}
  .login-denied{background:var(--danger-bg);border:1px solid var(--danger-line);color:var(--danger);border-radius:10px;padding:12px 14px;font-size:12.5px;text-align:left;margin-top:16px;line-height:1.6;}
  .hr-account-chip{display:flex;align-items:center;gap:9px;padding:9px 11px;border-radius:9px;background:rgba(255,255,255,.06);margin-bottom:8px;}
  .hr-account-chip .avatar{width:26px;height:26px;border-radius:50%;background:var(--brand);color:#fff;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;}
  .hr-account-chip .email{font-size:11px;color:rgba(255,255,255,.75);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;}
  .hr-signout{font-size:11px;color:rgba(255,255,255,.5);cursor:pointer;flex-shrink:0;}
  .hr-signout:hover{color:#fff;}

  /* ---------- MODUL SURAT PERINGATAN & TEGURAN ---------- */
  .sp-sev-sp1{--sev:#d19a00;} .sp-sev-sp2{--sev:#e2620d;} .sp-sev-sp3{--sev:#d02525;}
  .sp-sev-teguran{--sev:#0e7490;} .sp-sev-phk{--sev:#7d1a2f;} .sp-sev-other{--sev:#64748b;}

  .sp-chips{display:flex;flex-wrap:wrap;gap:9px;}
  .sp-chip{position:relative;display:inline-flex;align-items:center;gap:8px;padding:9px 14px;border:1px solid var(--line-strong);border-radius:999px;background:#fcfefe;font-size:13px;font-weight:500;cursor:pointer;transition:.15s;user-select:none;}
  .sp-chip:hover{border-color:var(--brand);}
  .sp-chip input{position:absolute;opacity:0;pointer-events:none;}
  .sp-chip .box{width:15px;height:15px;border-radius:5px;border:1.5px solid var(--line-strong);display:inline-flex;align-items:center;justify-content:center;transition:.15s;flex-shrink:0;}
  .sp-chip.on{background:var(--brand-050);border-color:var(--brand);color:#0b5c55;}
  .sp-chip.on .box{background:var(--brand);border-color:var(--brand);}
  .sp-chip.on .box::after{content:"";width:7px;height:4px;border-left:2px solid #fff;border-bottom:2px solid #fff;transform:rotate(-45deg) translateY(-1px);}

  .sp-jenis-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;}
  .sp-jenis{position:relative;border:1.5px solid var(--line-strong);border-radius:11px;padding:13px 12px;cursor:pointer;transition:.15s;background:#fcfefe;}
  .sp-jenis:hover{border-color:var(--sev);}
  .sp-jenis input{position:absolute;opacity:0;}
  .sp-jenis .tag{display:inline-block;width:9px;height:9px;border-radius:50%;background:var(--sev);margin-bottom:7px;}
  .sp-jenis .name{display:block;font-family:var(--font-d);font-weight:700;font-size:14px;line-height:1.15;}
  .sp-jenis .sub{font-size:11px;color:var(--muted);}
  .sp-jenis.on{border-color:var(--sev);background:color-mix(in srgb,var(--sev) 8%,#fff);box-shadow:0 0 0 3px color-mix(in srgb,var(--sev) 16%,transparent);}

  .sp-reveal{margin-top:10px;display:none;}.sp-reveal.show{display:block;}

  .sp-stat-row{display:grid;grid-template-columns:repeat(6,1fr);gap:12px;margin-bottom:18px;}
  .sp-stat{background:var(--surface);border:1px solid var(--line);border-radius:13px;padding:14px 14px 12px;box-shadow:var(--shadow);border-top:3px solid var(--sev);}
  .sp-stat .lbl{font-size:11px;font-weight:600;color:var(--muted);display:flex;align-items:center;gap:6px;}
  .sp-stat .lbl .d{width:7px;height:7px;border-radius:50%;background:var(--sev);flex-shrink:0;}
  .sp-stat .num{font-family:var(--font-d);font-weight:800;font-size:24px;line-height:1;margin:7px 0 2px;}
  .sp-stat .pct{font-size:11px;color:var(--muted);}

  .sp-panels{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px;}
  .sp-panel{background:var(--surface);border:1px solid var(--line);border-radius:14px;box-shadow:var(--shadow);padding:20px;}
  .sp-panel.full{grid-column:1/-1;}
  .sp-panel h3{font-size:14.5px;margin-bottom:2px;}
  .sp-panel .ph{font-size:11.5px;color:var(--muted);margin-bottom:14px;}

  .sp-donut-wrap{display:flex;align-items:center;gap:18px;flex-wrap:wrap;}
  .sp-donut{width:140px;height:140px;flex:none;}
  .sp-dn-num{font-family:var(--font-d);font-weight:800;font-size:23px;fill:var(--ink);text-anchor:middle;}
  .sp-dn-lbl{font-size:8px;fill:var(--muted);text-anchor:middle;font-weight:600;text-transform:uppercase;letter-spacing:.06em;}
  .sp-donut-legend{display:flex;flex-direction:column;gap:9px;min-width:140px;flex:1;}
  .sp-dl-item{display:flex;align-items:center;gap:8px;font-size:12.5px;color:var(--ink);}
  .sp-dl-item i{width:10px;height:10px;border-radius:3px;flex:none;}
  .sp-dl-item b{font-weight:600;flex:1;white-space:nowrap;}
  .sp-dl-item em{font-style:normal;color:var(--muted);font-size:11.5px;}

  .sp-bars{display:flex;flex-direction:column;gap:11px;}
  .sp-bar-row{display:grid;grid-template-columns:110px 1fr auto;align-items:center;gap:10px;}
  .sp-bar-name{font-size:12.5px;font-weight:600;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .sp-bar-track{height:22px;background:#eef4f3;border-radius:6px;overflow:hidden;}
  .sp-bar-fill{height:100%;border-radius:6px;min-width:3px;transition:width .5s ease;display:flex;}
  .sp-bar-seg{height:100%;}
  .sp-bar-val{font-size:12.5px;font-weight:700;color:var(--ink-soft);white-space:nowrap;}

  .sp-colorkey{display:flex;flex-wrap:wrap;align-items:center;gap:8px 16px;background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:11px 15px;margin-bottom:18px;box-shadow:var(--shadow);font-size:11.5px;color:var(--ink-soft);}
  .sp-colorkey .kt{font-weight:700;color:var(--ink);}
  .sp-colorkey span.k{display:inline-flex;align-items:center;gap:6px;}
  .sp-colorkey i{width:9px;height:9px;border-radius:3px;display:inline-block;}
  .sp-empty-mini{color:var(--muted);font-size:12.5px;padding:12px 0;text-align:center;width:100%;}

  @media(max-width:900px){
    .sidebar{width:72px;}
    .sb-title,.sb-sub,.sb-section-label,.sb-item span,.sb-role-label,.role-toggle,.sync-status span{display:none;}
    .sb-item{justify-content:center;}
    .main{margin-left:72px;}
    .sb-foot{display:none;}
    .sp-jenis-grid{grid-template-columns:repeat(2,1fr);}
    .sp-panels{grid-template-columns:1fr;}
    .sp-stat-row{grid-template-columns:repeat(3,1fr);}
  }
</style>
</head>
<body>

<div class="sidebar">
  <div class="sb-brand">
    <div class="sb-mark">CT</div>
    <div>
      <div class="sb-title">Coaching Tracker</div>
      <div class="sb-sub">Kompilasi form coaching</div>
    </div>
  </div>
  <div class="sb-nav" id="sbNav"></div>
  <div class="sb-foot">
    <div id="sbHrAccount"></div>
    <div class="sb-role-label">Login sebagai</div>
    <div class="role-toggle">
      <button id="roleBtnHr" onclick="setRole('hr')">HR</button>
      <button id="roleBtnAtasan" onclick="setRole('atasan')">Atasan</button>
    </div>
    <div class="sync-status" id="syncStatus" onclick="manualSync()"></div>
  </div>
</div>

<div class="main">
  <div class="topbar" id="topbar"></div>
  <div class="content" id="app"></div>
</div>

<div id="modalRoot"></div>

<script>
/* =========================================================================
   KONFIGURASI GOOGLE SHEETS
   1. Deploy Code.gs (terlampir terpisah) sebagai Web App di Apps Script.
   2. Salin URL Web App hasil deploy, tempel di bawah ini.
   3. Kalau dikosongkan, dashboard tetap jalan dengan data dummy lokal.

/* ---------- GOOGLE SIGN-IN (GATE UNTUK LAYER 1 / HR) ---------- */
function decodeJwt(token){
  try{
    const payload = token.split(".")[1];
    const base64 = payload.replace(/-/g,'+').replace(/_/g,'/');
    const json = decodeURIComponent(atob(base64).split('').map(c => '%'+('00'+c.charCodeAt(0).toString(16)).slice(-2)).join(''));
    return JSON.parse(json);
  }catch(e){ return null; }
}

function handleGoogleSignIn(response){
  const payload = decodeJwt(response.credential);
  if(!payload || !payload.email){
    alert("Gagal membaca informasi akun Google. Coba lagi.");
    return;
  }
  state.googleIdToken = response.credential;
  state.googleEmail = payload.email;
  state.hrAuthorized = ALLOWED_HR_EMAILS.map(e=>e.toLowerCase()).includes(payload.email.toLowerCase());
  render();
}

function googleSignOut(){
  state.googleIdToken = null;
  state.googleEmail = null;
  state.hrAuthorized = false;
  if(window.google && google.accounts && google.accounts.id){
    google.accounts.id.disableAutoSelect();
  }
  render();
}

function isGoogleSignInReady(){
  return !!(window.google && google.accounts && google.accounts.id && GOOGLE_CLIENT_ID && GOOGLE_CLIENT_ID.indexOf("PASTE_") !== 0);
}

function renderGoogleButton(){
  const el = document.getElementById("googleSignInBtn");
  if(!el) return;
  if(!isGoogleSignInReady()){
    el.innerHTML = `<div class="login-denied">Google Sign-In belum dikonfigurasi. Tempel GOOGLE_CLIENT_ID yang valid di kode dashboard.</div>`;
    return;
  }
  google.accounts.id.initialize({ client_id: GOOGLE_CLIENT_ID, callback: handleGoogleSignIn });
  google.accounts.id.renderButton(el, { theme: "outline", size: "large", text: "signin_with", shape: "pill", width: 260 });
}

/* ---------- GOOGLE SHEETS SYNC LAYER ---------- */
async function loadFromSheets(){
  if(!SHEETS_API_URL) return;
  state.syncing = true; renderSyncStatus();
  try{
    const res = await fetch(SHEETS_API_URL);
    const data = await res.json();
    if(data && data.records){
      STORAGE.records = data.records.map(r => ({
        id: r.id, namaAtasan: r.namaAtasan, jabatan: r.jabatan, divisi: r.divisi,
        namaKaryawan: r.namaKaryawan, posisiKaryawan: r.posisiKaryawan, divisiKaryawan: r.divisiKaryawan,
        penempatan: r.penempatan, periode: r.periode, status: r.status,
        submission: r.submission ? {
          areaCoaching: r.submission.areaCoaching, alasan: r.submission.alasan,
          penempatan: r.submission.penempatan, catatan: r.submission.catatan,
          fileName: r.submission.fileName, fileUrl: r.submission.fileUrl, fileDataUrl: null
        } : null
      }));
    }
    if(data && Array.isArray(data.suratTindakan)){
      STORAGE.suratTindakan = data.suratTindakan;
    }
    state.connected = true;
  }catch(err){
    console.error("Gagal memuat dari Sheets:", err);
    state.connected = false;
  }
  state.syncing = false; renderSyncStatus();
}

// Trik: pakai Content-Type text/plain supaya browser tidak mengirim preflight OPTIONS
// (Apps Script Web App tidak menangani preflight CORS dengan baik).
async function postToSheets(action, payload){
  if(!SHEETS_API_URL) return null;
  try{
    const res = await fetch(SHEETS_API_URL, {
      method: "POST",
      headers: {"Content-Type": "text/plain;charset=utf-8"},
      body: JSON.stringify({ action, ...payload })
    });
    return await res.json();
  }catch(err){
    console.error("Gagal mengirim ke Sheets:", err);
    return null;
  }
}

/* ---------- PAGINATION HELPERS ---------- */
function paginate(arr, page){
  const total = arr.length;
  const pages = Math.max(1, Math.ceil(total / PAGE_SIZE));
  const safePage = Math.min(Math.max(1, page), pages);
  const start = (safePage - 1) * PAGE_SIZE;
  return { rows: arr.slice(start, start + PAGE_SIZE), total, pages, page: safePage, start };
}

function pageButtons(pages, current){
  let nums = [];
  if(pages <= 7){
    nums = Array.from({length:pages}, (_,i)=>i+1);
  } else {
    nums = [1];
    if(current > 3) nums.push("...");
    for(let p = Math.max(2,current-1); p <= Math.min(pages-1,current+1); p++) nums.push(p);
    if(current < pages-2) nums.push("...");
    nums.push(pages);
  }
  return nums;
}

function renderPagination(target, pageInfo, currentPage, onPageFn){
  if(pageInfo.total === 0) return "";
  const nums = pageButtons(pageInfo.pages, pageInfo.page);
  const btns = nums.map(n => n === "..."
    ? `<span class="page-ellipsis">&hellip;</span>`
    : `<button class="page-btn ${n===pageInfo.page ? 'active':''}" onclick="${onPageFn}(${n})">${n}</button>`
  ).join("");
  return `
    <div class="pagination">
      <div class="pagination-info">Menampilkan ${pageInfo.start+1}&ndash;${Math.min(pageInfo.start+PAGE_SIZE, pageInfo.total)} dari ${pageInfo.total} data</div>
      <div class="pagination-pages">
        <button class="page-btn" ${pageInfo.page<=1?'disabled':''} onclick="${onPageFn}(${pageInfo.page-1})">&lsaquo;</button>
        ${btns}
        <button class="page-btn" ${pageInfo.page>=pageInfo.pages?'disabled':''} onclick="${onPageFn}(${pageInfo.page+1})">&rsaquo;</button>
      </div>
    </div>
  `;
}

function attachLayer3Handlers(){
  const form = document.getElementById("submissionForm");
  if(!form) return;
  form.addEventListener("submit", async (e) => {
    e.preventDefault();
    const r = STORAGE.records.find(x => x.id === state.activeRecordId);
    if(!r) return;
    const alasan = document.getElementById("f_alasan").value.trim();
    const areaCoaching = document.getElementById("f_area").value.trim();
    const catatan = document.getElementById("f_catatan").value.trim();
    const penempatan = document.getElementById("f_penempatan").value.trim();
    const fileInput = document.getElementById("f_file");
    const file = fileInput && fileInput.files && fileInput.files[0] ? fileInput.files[0] : null;

    if(!areaCoaching || !alasan){
      alert("Mohon lengkapi Area Coaching dan Alasan Pemberian Coaching sebelum mengirim.");
      return;
    }

    const submitBtn = document.getElementById("submitBtn");
    if(submitBtn){ submitBtn.disabled = true; submitBtn.textContent = "Mengirim..."; }

    const finish = async (fileName, fileDataUrl) => {
      const submissionData = { areaCoaching, alasan, catatan, penempatan, fileName, fileDataUrl, fileUrl: null };
      r.submission = submissionData;
      r.status = "complete";

      if(SHEETS_API_URL){
        const res = await postToSheets("submitCoaching", {
          id: r.id,
          data: { areaCoaching, alasan, catatan, penempatan, fileName, fileBase64: fileDataUrl }
        });
        if(res && res.fileUrl) r.submission.fileUrl = res.fileUrl;
      }
      setView("layer2");
    };

    if(file){
      const reader = new FileReader();
      reader.onload = () => finish(file.name, reader.result);
      reader.readAsDataURL(file);
    } else {
      await finish(null, null);
    }
  });
}

function spOnCabang(){
  document.getElementById("spCabangOther").classList.toggle("show", document.getElementById("sp_cabang").value === "__other");
}
function spOnJenis(){
  const checked = document.querySelector('input[name="sp_jenis"]:checked');
  const v = checked ? checked.value : "";
  document.getElementById("spDateBox").classList.toggle("show", SP_TYPES.includes(v));
  document.querySelectorAll(".sp-jenis").forEach(l => l.classList.toggle("on", l.querySelector("input").checked));
}
function spOnAlasanOther(){
  document.getElementById("spAlasanOther").classList.toggle("show", document.querySelector("#spAlasanOtherChip input").checked);
}
function spAddMonths(dt, n){ const x = new Date(dt); x.setMonth(x.getMonth() + n); return x; }
function spFmtDateLong(s){
  const dt = new Date(s);
  if(isNaN(dt)) return "-";
  const MONTHS_ID = ["Januari","Februari","Maret","April","Mei","Juni","Juli","Agustus","September","Oktober","November","Desember"];
  return dt.getDate() + " " + MONTHS_ID[dt.getMonth()] + " " + dt.getFullYear();
}
function spOnDate(){
  const v = document.getElementById("sp_tanggalSP").value;
  const hint = document.getElementById("spExpiryHint");
  if(!v){ hint.textContent = ""; return; }
  const exp = spAddMonths(new Date(v), SP_PERIOD_MONTHS);
  hint.innerHTML = "Masa SP berakhir & karyawan <b>eligible kembali</b> pada <b>" + spFmtDateLong(exp) + "</b>.";
}

document.addEventListener("change", (e) => {
  if(e.target.closest && e.target.closest("#spAlasanChips")){
    const chip = e.target.closest(".sp-chip");
    if(chip) chip.classList.toggle("on", e.target.checked);
  }
});

function spGetAlasan(){
  const arr = [];
  document.querySelectorAll("#spAlasanChips input:checked").forEach(c => {
    if(c.value === "__other"){
      const o = document.getElementById("sp_alasanOther").value.trim();
      if(o) arr.push(o);
    } else {
      arr.push(c.value);
    }
  });
  return arr;
}
function spGetCabang(){
  const v = document.getElementById("sp_cabang").value;
  return v === "__other" ? document.getElementById("sp_cabangOther").value.trim() : v;
}
function spGetJenis(){
  const checked = document.querySelector('input[name="sp_jenis"]:checked');
  return checked ? checked.value : "";
}

function attachSPFormHandlers(){
  const form = document.getElementById("spForm");
  if(!form) return;
  form.addEventListener("submit", async (e) => {
    e.preventDefault();
    const get = (id) => document.getElementById(id).value.trim();

    const req = [
      ["sp_namaAtasan","Nama Atasan"], ["sp_posisiAtasan","Posisi Atasan"], ["sp_divisiAtasan","Divisi Atasan"],
      ["sp_namaKaryawan","Nama Karyawan"], ["sp_posisiKaryawan","Posisi Karyawan"], ["sp_divisiKaryawan","Divisi Karyawan"],
      ["sp_detail","Detail Pelanggaran"]
    ];
    for(const [id, label] of req){
      if(!get(id)){ alert("Mohon lengkapi: " + label); document.getElementById(id).focus(); return; }
    }
    const cabang = spGetCabang();
    if(!cabang){ alert("Mohon pilih atau isi Cabang."); return; }
    const jenis = spGetJenis();
    if(!jenis){ alert("Mohon pilih Jenis Tindakan."); return; }
    const tanggalSP = get("sp_tanggalSP");
    if(SP_TYPES.includes(jenis) && !tanggalSP){ alert("Mohon isi Tanggal Berlaku Surat Peringatan."); document.getElementById("sp_tanggalSP").focus(); return; }
    const alasan = spGetAlasan();
    if(alasan.length === 0){ alert("Mohon pilih minimal satu Alasan Pemberian Surat."); return; }

    const data = {
      namaAtasan: get("sp_namaAtasan"), posisiAtasan: get("sp_posisiAtasan"), divisiAtasan: get("sp_divisiAtasan"),
      namaKaryawan: get("sp_namaKaryawan"), posisiKaryawan: get("sp_posisiKaryawan"), divisiKaryawan: get("sp_divisiKaryawan"),
      cabang, jenis, alasan: alasan.join(", "), tanggalSP, detail: get("sp_detail")
    };

    const btn = document.getElementById("spSubmitBtn");
    btn.disabled = true; btn.textContent = "Mengirim...";

    let newId = "local-" + Date.now();
    let newTimestamp = new Date().toISOString();

    if(SHEETS_API_URL){
      const res = await postToSheets("submitSuratTindakan", { data });
      if(!res || res.error){
        alert("Gagal mengirim: " + (res && res.error ? res.error : "tidak ada respons dari server. Coba lagi."));
        btn.disabled = false; btn.textContent = "Kirim Pengajuan";
        return;
      }
      if(res.id) newId = res.id;
      if(res.timestamp) newTimestamp = res.timestamp;
    }

    STORAGE.suratTindakan.push({ id: newId, timestamp: newTimestamp, ...data });
    alert("Pengajuan berhasil dikirim.");
    setView("sp-form");
  });
}

/* ---------- DASHBOARD (HR) ---------- */
function spEntryDate(e){ return e.tanggalSP || e.timestamp; }
function spEligState(e){
  if(!SP_TYPES.includes(e.jenis)) return null;
  const start = new Date(e.tanggalSP || e.timestamp);
  if(isNaN(start)) return null;
  const exp = spAddMonths(start, SP_PERIOD_MONTHS);
  const now = new Date(); now.setHours(0,0,0,0);
  const days = Math.ceil((exp - now) / 86400000);
  if(days <= 0) return { key:"eligible", label:"Eligible Kembali", color:"#0f9d6f", days, exp };
  if(days <= SP_SOON_DAYS) return { key:"soon", label:"Akan Berakhir", color:"#e2620d", days, exp };
  return { key:"active", label:"Masa Aktif SP", color:"#d02525", days, exp };
}

function spDonutHtml(segs, centerNum, centerLbl){
  segs = segs.filter(s => s.value > 0);
  const total = segs.reduce((a,s) => a + s.value, 0);
  if(!total) return `<div class="sp-donut-wrap"><div class="sp-empty-mini">Belum ada data.</div></div>`;
  const R = 48, C = 2 * Math.PI * R;
  let off = 0;
  const rings = segs.map(s => {
    const dash = (s.value / total) * C;
    const ring = `<circle cx="60" cy="60" r="${R}" fill="none" style="stroke:${s.color}" stroke-width="18" stroke-dasharray="${dash.toFixed(2)} ${(C-dash).toFixed(2)}" stroke-dashoffset="${(-off).toFixed(2)}"/>`;
    off += dash;
    return ring;
  }).join("");
  const legend = segs.map(s => {
    const pct = ((s.value/total)*100).toFixed(0);
    return `<span class="sp-dl-item"><i style="background:${s.color}"></i><b>${esc(s.label)}</b><em>${s.value} &middot; ${pct}%</em></span>`;
  }).join("");
  return `
    <div class="sp-donut-wrap">
      <svg viewBox="0 0 120 120" class="sp-donut" role="img">
        <g transform="rotate(-90 60 60)"><circle cx="60" cy="60" r="${R}" fill="none" stroke="#eef4f3" stroke-width="18"/>${rings}</g>
        <text x="60" y="57" class="sp-dn-num">${centerNum}</text><text x="60" y="72" class="sp-dn-lbl">${esc(centerLbl)}</text>
      </svg>
      <div class="sp-donut-legend">${legend}</div>
    </div>
  `;
}

function spGroupBy(data, key){
  const map = {};
  data.forEach(e => {
    const k = String(e[key] || "\u2014").trim() || "\u2014";
    map[k] = map[k] || { total: 0, by: {} };
    map[k].total++;
    map[k].by[e.jenis] = (map[k].by[e.jenis] || 0) + 1;
  });
  return Object.entries(map).map(([name, v]) => ({ name, ...v })).sort((a,b) => b.total - a.total).slice(0, 8);
}

function spBarsHtml(rows){
  if(!rows.length) return `<div class="sp-empty-mini">Belum ada data.</div>`;
  const max = Math.max(...rows.map(r => r.total));
  return rows.map(r => {
    const w = (r.total / max) * 100;
    const segs = SP_JENIS_KEYS.filter(k => r.by[k]).map(k => `<div class="sp-bar-seg" style="width:${(r.by[k]/r.total)*100}%;background:${spSevOf(k).color}"></div>`).join("");
    const other = Object.keys(r.by).filter(k => !SP_JENIS_KEYS.includes(k)).reduce((s,k) => s + r.by[k], 0);
    const otherSeg = other ? `<div class="sp-bar-seg" style="width:${(other/r.total)*100}%;background:${SP_OTHER_COLOR}"></div>` : "";
    return `<div class="sp-bar-row"><div class="sp-bar-name" title="${esc(r.name)}">${esc(r.name)}</div>
      <div class="sp-bar-track"><div class="sp-bar-fill" style="width:${w}%">${segs}${otherSeg}</div></div>
      <div class="sp-bar-val">${r.total}</div></div>`;
  }).join("");
}

function spIneligibleList(data){
  const map = {};
  data.forEach(e => {
    const el = spEligState(e);
    if(el && el.days > 0){
      const k = (e.namaKaryawan||"") + "|" + (e.cabang||"");
      if(!map[k] || el.exp > map[k]._exp){
        map[k] = { nama:e.namaKaryawan, cabang:e.cabang, divisi:e.divisiKaryawan, jenis:e.jenis, exp:spFmtDateLong(el.exp), days:el.days, _exp:el.exp };
      }
    }
  });
  return Object.values(map).sort((a,b) => a._exp - b._exp);
}

function renderSPDashboard(){
  const data = STORAGE.suratTindakan.slice().sort((a,b) => new Date(spEntryDate(b)) - new Date(spEntryDate(a)));
  const total = data.length;

  const statRow = SP_JENIS_KEYS.map(key => {
    const j = SP_JENIS[key];
    const n = data.filter(e => e.jenis === key).length;
    const pct = total ? ((n/total)*100).toFixed(0) : 0;
    return `<div class="sp-stat ${j.cls}"><div class="lbl"><span class="d"></span>${esc(j.short)}</div><div class="num">${n}</div><div class="pct">${pct}% dari total</div></div>`;
  }).join("") + `<div class="sp-stat" style="--sev:var(--brand);"><div class="lbl"><span class="d"></span>Total</div><div class="num">${total}</div><div class="pct">Semua pengajuan</div></div>`;

  const jenisDonut = spDonutHtml(SP_JENIS_KEYS.map(k => ({ label: SP_JENIS[k].short, value: data.filter(e=>e.jenis===k).length, color: SP_JENIS[k].color })), total, "Total");

  const spOnly = data.filter(e => SP_TYPES.includes(e.jenis));
  const bucket = { active:0, soon:0, eligible:0 };
  spOnly.forEach(e => { const el = spEligState(e); if(el) bucket[el.key]++; });
  const masaDonut = spDonutHtml([
    { label:"Masa Aktif SP", value:bucket.active, color:"#d02525" },
    { label:`Akan Berakhir (\u2264${SP_SOON_DAYS} hari)`, value:bucket.soon, color:"#e2620d" },
    { label:"Eligible Kembali", value:bucket.eligible, color:"#0f9d6f" },
  ], spOnly.length, "Total SP");

  const barCabang = spBarsHtml(spGroupBy(data, "cabang"));
  const barDivisi = spBarsHtml(spGroupBy(data, "divisiKaryawan"));

  const colorKey = `<span class="kt">Warna jenis:</span>` + SP_JENIS_KEYS.map(k => `<span class="k"><i style="background:${SP_JENIS[k].color}"></i>${esc(SP_JENIS[k].short)}</span>`).join("") + `<span class="k"><i style="background:${SP_OTHER_COLOR}"></i>Lainnya</span>`;

  const ineligible = spIneligibleList(data);
  const ineligibleRows = ineligible.length
    ? ineligible.map((r,i) => {
        const soon = r.days <= SP_SOON_DAYS;
        return `<tr><td class="cell-muted">${i+1}</td><td class="font-medium">${esc(r.nama)}</td><td>${esc(r.divisi||'-')}</td><td>${esc(r.cabang||'-')}</td>
          <td><span class="badge" style="background:${spSevOf(r.jenis).color}22;color:${spSevOf(r.jenis).color};border-color:${spSevOf(r.jenis).color}55;">${esc(spSevOf(r.jenis).short)}</span></td>
          <td><b>${esc(r.exp)}</b><div class="cell-sub" style="color:${soon?'#c85410':'var(--muted)'};">sisa ${r.days} hari${soon?' &middot; segera berakhir':''}</div></td></tr>`;
      }).join("")
    : `<tr><td colspan="6"><div class="empty-state">Tidak ada karyawan dalam masa SP saat ini.</div></td></tr>`;

  const pg = paginate(data, state.pageSP);
  const tableRows = pg.rows.length
    ? pg.rows.map((e,i) => {
        const j = spSevOf(e.jenis);
        const el = spEligState(e);
        const masaCell = el
          ? `<span class="badge" style="background:${el.color}22;color:${el.color};border-color:${el.color}55;">${esc(el.label)}</span><div class="cell-sub">${el.days>0 ? 'sisa '+el.days+' hari' : 'berakhir '+(-el.days)+' hari lalu'}</div>`
          : (e.jenis === "Surat PHK" ? `<span class="cell-muted">&mdash; (PHK)</span>` : `<span class="cell-muted">Tidak ada masa SP</span>`);
        return `<tr>
          <td class="cell-muted">${pg.start+i+1}</td>
          <td class="font-medium">${esc(e.namaKaryawan)}<div class="cell-sub">${esc(e.posisiKaryawan||'-')} &middot; ${esc(e.divisiKaryawan||'-')}</div></td>
          <td><span class="badge" style="background:${j.color}22;color:${j.color};border-color:${j.color}55;">${esc(j.short)}</span></td>
          <td>${esc(e.cabang||'-')}</td>
          <td>${fmtDate(spEntryDate(e))}</td>
          <td>${masaCell}</td>
        </tr>`;
      }).join("")
    : `<tr><td colspan="6"><div class="empty-state">Belum ada pengajuan Surat Peringatan / Teguran.</div></td></tr>`;

  return `
    <div style="display:grid;grid-template-columns:repeat(6,1fr);gap:12px;margin-bottom:22px;" class="sp-stat-row">${statRow}</div>

    <div class="sp-panels">
      <div class="sp-panel"><h3>Komposisi Jenis Tindakan</h3><div class="ph">Proporsi SP &amp; Surat Teguran</div>${jenisDonut}</div>
      <div class="sp-panel"><h3>Status Masa SP</h3><div class="ph">Sebaran masa berlaku Surat Peringatan (${SP_PERIOD_MONTHS} bulan)</div>${masaDonut}</div>
      <div class="sp-panel"><h3>Berdasarkan Cabang</h3><div class="ph">Cabang dengan tindakan terbanyak</div><div class="sp-bars">${barCabang}</div></div>
      <div class="sp-panel"><h3>Berdasarkan Divisi</h3><div class="ph">Divisi dengan tindakan terbanyak</div><div class="sp-bars">${barDivisi}</div></div>
    </div>

    <div class="sp-colorkey">${colorKey}</div>

    <div class="card" style="padding:20px;margin-bottom:18px;">
      <div style="display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:14px;flex-wrap:wrap;">
        <div>
          <div class="section-title" style="font-size:14.5px;">Karyawan dalam Masa SP</div>
          <div class="page-desc" style="margin-top:2px;">Belum eligible untuk kenaikan gaji, pengajuan loan, dll. selama masa SP berjalan.</div>
        </div>
        <span class="badge ${ineligible.length ? 'badge-danger' : 'badge-ok'}"><span class="badge-dot"></span>${ineligible.length} karyawan</span>
      </div>
      <div style="overflow-x:auto;border:1px solid var(--line);border-radius:12px;">
        <table><thead><tr><th style="width:36px;">No</th><th>Nama</th><th>Divisi</th><th>Cabang</th><th>SP Terakhir</th><th>Eligible Kembali</th></tr></thead>
        <tbody>${ineligibleRows}</tbody></table>
      </div>
    </div>

    <div class="card" style="overflow-x:auto;">
      <table>
        <thead><tr><th style="width:36px;">No</th><th>Karyawan</th><th>Jenis</th><th>Cabang</th><th>Tanggal</th><th>Masa Berlaku SP</th></tr></thead>
        <tbody>${tableRows}</tbody>
      </table>
      ${renderPagination('sp', pg, state.pageSP, 'goPageSP')}
    </div>
  `;
}

    <div class="modal-backdrop" onclick="if(event.target===this) closeModal()">
      <div class="card" style="padding:22px;width:100%;max-width:600px;max-height:90vh;overflow-y:auto;">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;">
          <div class="page-title" style="font-size:16px;">Detail Coaching</div>
          <div class="icon-btn" onclick="closeModal()">${ic.close}</div>
        </div>
        <div style="font-size:12.5px;color:var(--muted);margin-bottom:16px;">${esc(r.namaKaryawan)} &middot; ${fmtDate(r.periode)}</div>

        <div class="divider" style="margin-bottom:16px;"></div>

        <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;font-size:13px;margin-bottom:18px;">
          <div><div class="field-label">Nama Atasan</div>${esc(r.namaAtasan)}</div>
          <div><div class="field-label">Jabatan / Divisi</div>${esc(r.jabatan)} &middot; ${esc(r.divisi)}</div>
          <div><div class="field-label">Nama Karyawan</div>${esc(r.namaKaryawan)}</div>
          <div><div class="field-label">Posisi / Divisi</div>${esc(r.posisiKaryawan)} &middot; ${esc(r.divisiKaryawan)}</div>
          <div><div class="field-label">Penempatan</div>${esc((s && s.penempatan) || r.penempatan)}</div>
          <div><div class="field-label">Status</div>${statusBadge(r.status)}</div>
        </div>

        ${s ? `
          <div class="divider" style="margin-bottom:16px;"></div>
          <div style="display:flex;flex-direction:column;gap:12px;font-size:13px;">
            <div><div class="field-label">Area Coaching</div>${s.areaCoaching ? esc(s.areaCoaching) : '<span class="cell-muted">&mdash;</span>'}</div>
            <div><div class="field-label">Alasan Pemberian Coaching</div>${esc(s.alasan)}</div>
            <div><div class="field-label">Catatan Coaching</div>${s.catatan ? esc(s.catatan) : '<span class="cell-muted">&mdash;</span>'}</div>
            <div>
              <div class="field-label">Dokumen Coaching</div>
              ${fileHref
                ? `<a href="${fileHref}" target="_blank" class="file-chip" style="display:inline-flex;">${ic.file}${esc(s.fileName)}</a>`
                : `<span class="cell-muted">Tidak ada file diunggah</span>`}
            </div>
          </div>
        ` : `<div class="empty-state" style="padding:20px 0;">Atasan belum mengisi form submission untuk baris ini.</div>`}
      </div>
    </div>
  `;
}

function closeModal(){ document.getElementById("modalRoot").innerHTML = ""; }

async function saveRecord(id){
  const get = (k) => document.getElementById(k).value.trim();
  const data = {
    namaAtasan: get("m_namaAtasan"), jabatan: get("m_jabatan"), divisi: get("m_divisi"),
    namaKaryawan: get("m_namaKaryawan"), posisiKaryawan: get("m_posisiKaryawan"), divisiKaryawan: get("m_divisiKaryawan"),
    penempatan: get("m_penempatan"), periode: get("m_periode"),
  };
  if(!data.namaAtasan || !data.namaKaryawan || !data.periode){
    alert("Mohon lengkapi minimal Nama Atasan, Nama Karyawan, dan Periode Coaching.");
    return;
  }

  if(SHEETS_API_URL){
    const res = id
      ? await postToSheets("updateRecord", { id, data, idToken: state.googleIdToken })
      : await postToSheets("addRecord", { data, idToken: state.googleIdToken });
    if(!res || res.error){
      alert("Gagal menyimpan: " + (res && res.error ? res.error : "tidak ada respons dari server. Coba lagi."));
      return;
    }
    if(id){
      Object.assign(STORAGE.records.find(x => x.id === id), data);
    } else {
      STORAGE.records.push({ id: res.id, ...data, submission:null, status:"uncomplete" });
    }
  } else {
    if(id){
      Object.assign(STORAGE.records.find(x => x.id === id), data);
    } else {
      const localId = STORAGE.nextId++;
      STORAGE.records.push({ id: localId, ...data, submission:null, status:"uncomplete" });
    }
  }
  closeModal();
  render();
}

async function deleteRecord(id){
  if(!confirm("Hapus data coaching ini? Data submission terkait juga akan terhapus.")) return;

  if(SHEETS_API_URL){
    const res = await postToSheets("deleteRecord", { id, idToken: state.googleIdToken });
    if(!res || res.error){
      alert("Gagal menghapus: " + (res && res.error ? res.error : "tidak ada respons dari server. Coba lagi."));
      return;
    }
  }
  STORAGE.records = STORAGE.records.filter(x => x.id !== id);
  render();
}

/* ---------- RENDER ---------- */
function renderLoginGate(desc){
  if(state.googleEmail && !state.hrAuthorized){
    return `
      <div class="card login-gate">
        <div class="login-icon"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="10" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg></div>
        <h2>Akun tidak memiliki akses</h2>
        <p>Akun <strong>${esc(state.googleEmail)}</strong> tidak terdaftar sebagai HR. Hubungi admin kalau menurutmu ini keliru, atau masuk dengan akun lain.</p>
        <button class="btn btn-outline" onclick="googleSignOut()">Ganti Akun</button>
        <div class="login-denied">Halaman ini hanya bisa diakses oleh akun Google yang terdaftar di whitelist HR.</div>
      </div>
    `;
  }
  return `
    <div class="card login-gate">
      <div class="login-icon"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="10" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg></div>
      <h2>Login untuk Mengakses Halaman Ini</h2>
      <p>${desc || 'Halaman ini khusus HR. Masuk dengan akun Google yang terdaftar untuk melanjutkan.'}</p>
      <div class="login-gate-btn-wrap"><div id="googleSignInBtn"></div></div>
    </div>
  `;
}

function render(){
  renderSidebarNav();
  renderTopbar();
  const app = document.getElementById("app");
  let html = "";
  if(!SHEETS_API_URL){
    html += `<div class="banner banner-warn">${ic.file} Dashboard belum tersambung ke Google Sheets &mdash; saat ini memakai data dummy lokal. Tempel URL Web App Apps Script di variabel <code>SHEETS_API_URL</code> pada kode untuk mengaktifkan sinkronisasi.</div>`;
  }

  let needsGoogleButton = false;

  if(state.role === "hr"){
    if(!state.hrAuthorized){
      const desc = state.view === "sp-dash"
        ? "Dashboard Surat Peringatan &amp; Teguran khusus HR. Masuk dengan akun Google yang terdaftar untuk melanjutkan."
        : "Halaman ini khusus HR. Masuk dengan akun Google yang terdaftar untuk melanjutkan.";
      html += renderLoginGate(desc);
      needsGoogleButton = true;
    } else if(state.view === "sp-dash"){
      html += renderSPDashboard();
    } else {
      html += renderLayer1();
    }
  } else if(state.view === "layer3" && state.activeRecordId){
    html += renderLayer3();
  } else if(state.view === "sp-form"){
    html += renderSPForm();
  } else {
    html += renderLayer2();
  }

  app.innerHTML = html;
  if(needsGoogleButton){
    renderGoogleButton();
  }
  if(state.role === "atasan" && state.view === "layer3" && state.activeRecordId){
    attachLayer3Handlers();
  }
  if(state.role === "atasan" && state.view === "sp-form"){
    attachSPFormHandlers();
  }
}

(async function init(){
  if(SHEETS_API_URL){ await loadFromSheets(); }
  render();
})();
</script>
</body>
</html>
